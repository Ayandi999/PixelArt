<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>PixelArt</title>
     <link rel="icon" href="/favicon.png" type="image/png">
     <link rel="stylesheet" href="/style.css">
</head>

<body>
     <h1>PixelArt</h1>
     <div id="board"></div>
     <script src="/socket.io/socket.io.js"></script>
     <script>
          let board = document.getElementById('board');
          const socket = io();

          for (let i = 0; i < 2500; i++) {
               // 1. Create a NEW input element inside the loop
               let inp = document.createElement('input');

               // 2. Set the attributes
               inp.type = 'color';       // Makes it a color picker
               inp.value = '#FFFFFF';    // Sets initial color to white
               inp.id = `color-${i}`;    // Gives it a unique ID (e.g., color-0, color-1)

               // 3. Append it to the board
               board.appendChild(inp);
          }
          //This event listener fires only when change is done to make the live color picking feature use 'input'
          board.addEventListener('change', (e) => {
               // Double check that the thing triggering the event is actually an input
               if (e.target.tagName === 'INPUT') {
                    // e.target is the specific box you clicked!
                    const changedId = e.target.id;
                    const newColor = e.target.value;

                    console.log(`Box ${changedId} was changed to color: ${newColor}`);

                    // Now you can send this info to the server!
                    socket.emit('color-update', { id: changedId, color: newColor });
               }
          });

          //This right here is to set the color as we want
          socket.on('initial-state', (state) => {
               //state is the {id:color} => 1:#FFFFF [like this]
               for (const id in state) {
                    const ele = document.getElementById(id);
                    if (ele) {
                         ele.value = state[id];
                    }
               }
          });

          socket.on("change-is-here", (data) => {
               const ele = document.getElementById(data.id);
               ele.value = data.color;
          })
     </script>
</body>

</html>
